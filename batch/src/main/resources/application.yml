spring:
  application:
    name: jumisa-batch

  # 비웹 앱 (서버 안 띄움). CLI 인자로 잡 실행 후 종료.
  main:
    web-application-type: none

  # === Supabase(Postgres) 연결 === (실제 값은 루트 .env)
  # 배치는 트랜잭션 풀러(6543, BATCH_DB_URL)를 우선 사용 → 세션풀러(5432) 15한도 회피.
  # BATCH_DB_URL 없으면 세션풀러로 폴백.
  datasource:
    url: ${BATCH_DB_URL:${SUPABASE_DB_URL}}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      # 배치는 단일 스레드 + 대부분 유휴(상주 스케줄러). Supabase 무료 세션풀러(최대 15)를
      # 웹앱과 나눠 써야 하므로, 놀 때는 연결을 0으로 반납하고 잡 돌 때만 잠깐 잡는다.
      maximum-pool-size: 2
      minimum-idle: 0
      idle-timeout: 10000      # 10초 유휴 시 연결 반납
      keepalive-time: 0

  # === Spring Batch ===
  batch:
    jdbc:
      # BATCH_* 메타테이블은 이미 생성됨 → 부팅 시 스키마 초기화 안 함.
      # (이걸 always 로 두면 부팅 때 DB 연결을 잡아, 풀 한도 초과 시 부팅 자체가 실패함)
      # 새 환경에서 최초 1회만 'always' 로 켜서 테이블 생성 후 다시 never.
      initialize-schema: never
    job:
      # 부팅 시 정의된 잡 자동 실행 (스프링 배치 기본). 비우면 모든 잡(master/price/finance) 실행.
      # 특정 잡만 돌리려면 실행 시 spring.batch.job.name=financeJob 지정.
      enabled: true

# === 한국투자증권(KIS) Open API ===
kis:
  env: ${KIS_ENV:vts}
  app-key: ${KIS_APP_KEY:}
  app-secret: ${KIS_APP_SECRET:}
  account-no: ${KIS_ACCOUNT_NO:}
  account-product-code: ${KIS_ACCOUNT_PRODUCT_CODE:01}
  rate-per-second: ${KIS_RATE_PER_SECOND:8}
  token-cache-path: ${KIS_TOKEN_CACHE_PATH:}

# === 금융위원회 공공데이터(data.go.kr) — 재무지표 ===
fsc:
  service-key: ${DATA_GO_KR_SERVICE_KEY:}

# === Jumisa 배치 ===
jumisa:
  batch:
    # 스케줄러 기본 on. 그냥 실행하면 @Scheduled 로 종료 안 하고 상주하며
    # 장중 시세/마스터를 자동 실행한다. (일회성으로 끄려면 BATCH_SCHEDULER_ENABLED=false)
    scheduler-enabled: ${BATCH_SCHEDULER_ENABLED:true}
