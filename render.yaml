# Render Blueprint
# Render 대시보드 → New → Blueprint → 이 저장소 연결 시 아래 서비스가 생성됨.
# Secret(SUPABASE_*) 은 대시보드에서 직접 입력한다(sync: false).
# 참고: https://render.com/docs/blueprint-spec

services:
  # ── 백엔드: Spring Boot (Docker) ─────────────────────────────
  - type: web
    name: jumisa-backend
    runtime: docker
    plan: free
    region: singapore           # 한국에서 가장 가까운 무료 리전
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /actuator/health
    envVars:
      # === Supabase Postgres (대시보드에서 직접 입력) ===
      - key: SUPABASE_DB_URL
        sync: false             # 예: jdbc:postgresql://...supabase.co:5432/postgres?sslmode=require
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      # === 선택: 배치/외부 API 키 (필요 시 주석 해제) ===
      # - key: BATCH_SCHEDULER_ENABLED
      #   value: "false"
      # - key: KIS_ENV
      #   value: vts
      # - key: KIS_APP_KEY
      #   sync: false
      # - key: KIS_APP_SECRET
      #   sync: false
      # - key: KIS_ACCOUNT_NO
      #   sync: false

  # ── AI 서비스: 주식전망 (Python / FastAPI) ────────────────────
  # 프론트 'AI 질문' 팝업이 호출. DB(Supabase) + Claude 로 전망/매매의견 생성.
  # 주소: https://jumisa-ai.onrender.com (사용자 직접 접속 X, 프론트가 /ai 로 프록시)
  - type: web
    name: jumisa-ai
    runtime: python
    plan: free
    region: singapore
    # 패키지명이 한글('주식전망')이라 레포 루트에서 패키지로 실행한다.
    buildCommand: pip install -r 주식전망/requirements.txt
    startCommand: python -m 주식전망.web
    healthCheckPath: /ai/health
    envVars:
      - key: PYTHONUTF8            # 한글 패키지명 안전하게 import
        value: "1"
      - key: LANG
        value: C.UTF-8
      # === Supabase Postgres (백엔드와 동일 값, 대시보드에서 입력) ===
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
      # === Google Gemini (무료 등급, 대시보드에서 입력) ===
      # 키 발급: https://aistudio.google.com/apikey
      - key: GEMINI_API_KEY
        sync: false
      # === 선택: 모델 ===
      # - key: AI_MODEL
      #   value: gemini-2.5-flash

  # ── 프론트엔드: React + Vite (Static Site) ───────────────────
  # 사용자가 접속하는 사이트. 주소: https://jumisa.onrender.com
  - type: web
    name: jumisa
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      # /api/* 요청을 백엔드로 프록시 → 브라우저 입장에선 same-origin
      # (세션 쿠키 인증이 정상 동작하도록. dev 의 vite proxy 를 프로덕션에서 재현)
      # 백엔드 실제 배포 주소와 일치함(확인 완료).
      - type: rewrite
        source: /api/*
        destination: https://jumisa-backend.onrender.com/api/*
      # /ai/* 요청을 파이썬 AI 서비스로 프록시 (dev 의 vite proxy 재현)
      - type: rewrite
        source: /ai/*
        destination: https://jumisa-ai.onrender.com/ai/*
      # SPA 라우팅: 나머지 경로는 index.html 로
      - type: rewrite
        source: /*
        destination: /index.html
