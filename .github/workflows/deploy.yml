name: deploy (self-hosted)

# main 에 push 되면 내 PC(자체 호스트 러너)가 받아서 docker compose 로 재배포한다.
# = Render 의 자동배포를 내 PC 에서 재현.

on:
  push:
    branches: [main]
  workflow_dispatch:        # 수동 트리거도 허용

# 동시에 두 배포가 겹치지 않게 (뒤 것이 앞 것을 취소)
concurrency:
  group: self-host-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 비밀 .env 주입 (호스트 고정 경로 → 워크스페이스)
        run: |
          # .env 는 git 미커밋이라 체크아웃에 없음. 러너 PC 의 고정 경로에서 복사.
          # 경로는 러너 머신 환경변수 JUMISA_ENV_FILE 로 지정(없으면 기본값).
          $src = if ($env:JUMISA_ENV_FILE) { $env:JUMISA_ENV_FILE } else { "C:\jumisa-secrets\.env" }
          if (-not (Test-Path $src)) {
            Write-Error "비밀 파일이 없습니다: $src  (러너 PC 에 .env 를 두고 JUMISA_ENV_FILE 로 경로 지정)"
            exit 1
          }
          Copy-Item $src ".env" -Force
          Write-Host "injected .env from $src"

      - name: Build & deploy (docker compose)
        run: |
          docker compose up -d --build --remove-orphans
          docker compose ps

      - name: 미사용 이미지 정리
        run: docker image prune -f
