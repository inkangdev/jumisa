name: batch run (self-hosted)

# GitHub Actions 탭 → batch run → Run workflow → job 선택 후 실행
# self-hosted runner(운영 PC)가 받아서 운영 DB에 적재

on:
  workflow_dispatch:
    inputs:
      job:
        description: '실행할 배치 잡'
        required: true
        default: 'historyFill'
        type: choice
        options:
          - historyFill
          - closing
          - master
          - finance
          - undervalue

concurrency:
  group: batch-run
  cancel-in-progress: false

jobs:
  batch:
    runs-on: [self-hosted]
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 비밀 .env 주입
        run: |
          $src = if ($env:JUMISA_ENV_FILE) { $env:JUMISA_ENV_FILE } else { "C:\jumisa-secrets\.env" }
          if (-not (Test-Path $src)) {
            Write-Error "비밀 파일이 없습니다: $src"
            exit 1
          }
          Copy-Item $src ".env" -Force

      - name: 배치 잡 실행
        run: |
          $job = "${{ github.event.inputs.job }}"
          Write-Host "배치 실행: $job"
          docker compose run --rm -e BATCH_SCHEDULER_ENABLED=false batch $job
          if ($LASTEXITCODE -ne 0) { Write-Error "배치 실패 (exit $LASTEXITCODE)"; exit $LASTEXITCODE }