# jumisa web — 정적 프론트(dist) 서빙 + 리버스 프록시.
# /api,/ai,/oauth2,/login/oauth2 → 백엔드/AI 서비스, 나머지 → index.html(SPA).

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # 업로드/요청 본문 여유
    client_max_body_size 5m;

    # 프록시 공통 헤더 — 백엔드 forward-headers-strategy=framework 가
    # X-Forwarded-Proto 로 외부 https 를 인식해야 카카오 redirect_uri(baseUrl)가 올바르게 생성됨.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;

    # ── 백엔드(Spring Boot :8080) ──────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
    }
    location /oauth2/ {
        proxy_pass http://backend:8080;
    }
    location /login/oauth2/ {
        proxy_pass http://backend:8080;
    }

    # ── AI(FastAPI :8000) ──────────────────────────────────────
    location /ai/ {
        proxy_pass http://ai:8000;
        proxy_read_timeout 120s;        # Gemini 응답 대기 여유
    }

    # ── 해시 박힌 정적 자산(/assets/*-<hash>.js|css): 장기 불변 캐시 ──
    # 파일명에 콘텐츠 해시가 있어 내용이 바뀌면 이름도 바뀜 → 안전하게 영구 캐시.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── SPA 진입점 index.html: 캐시 금지 ───────────────────────
    # 항상 최신 index.html 을 받아 새 번들(해시) 을 가리키게 함.
    # (캐시되면 배포 후에도 옛 index.html→옛 번들→옛 화면이 잔존: 대시보드 미표시 원인)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # ── SPA: 정적 우선, 없으면 index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
