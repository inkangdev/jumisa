# jumisa web — 정적 프론트(dist) 서빙 + 리버스 프록시.
# /api,/ai,/oauth2,/login/oauth2 → 백엔드/AI 서비스, 나머지 → index.html(SPA).

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # 업로드/요청 본문 여유
    client_max_body_size 5m;

    # 프록시 공통 헤더 — 백엔드 forward-headers-strategy=framework 가
    # X-Forwarded-Proto 로 외부 https 를 인식해야 카카오 redirect_uri(baseUrl)가 올바르게 생성됨.
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    proxy_http_version 1.1;

    # ── 백엔드(Spring Boot :8080) ──────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080;
    }
    location /oauth2/ {
        proxy_pass http://backend:8080;
    }
    location /login/oauth2/ {
        proxy_pass http://backend:8080;
    }

    # ── AI(FastAPI :8000) ──────────────────────────────────────
    location /ai/ {
        proxy_pass http://ai:8000;
        proxy_read_timeout 120s;        # Gemini 응답 대기 여유
    }

    # ── SPA: 정적 우선, 없으면 index.html ──────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
