spring:
  application:
    name: jumisa-app

  # === Postgres 연결 === (실제 값은 .env / docker compose, git 미커밋)
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}

  # === Flyway (DB 스키마 마이그레이션) ===
  # backend 가 단일 소유자. 마이그레이션: src/main/resources/db/migration/V*__*.sql
  flyway:
    enabled: true
    baseline-on-migrate: true   # 기존(운영) DB: history 없이도 baseline 후 시작 → V1 마킹·스킵
    baseline-version: 1         # 기존 DB 는 V1(현행 스키마)을 적용됨으로 간주. 이후 V2+ 만 적용.

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname
            client-name: 카카오
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  # 컨테이너는 PORT 주입(nginx 뒤). 로컬은 SERVER_PORT, 둘 다 없으면 8080.
  port: ${PORT:${SERVER_PORT:8080}}
  # 리버스 프록시(nginx) 뒤에서 실행 → X-Forwarded-* 헤더로 실제 호스트/스킴 감지
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
