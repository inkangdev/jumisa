spring:
  application:
    name: jumisa-app

  # === Supabase(Postgres) 연결 === (실제 값은 backend/.env, git 미커밋)
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      # Supabase Supavisor(트랜잭션 모드, 6543) 사용 시:
      # data-source-properties:
      #   prepareThreshold: 0

server:
  # Render 등은 PORT 주입. 로컬은 SERVER_PORT, 둘 다 없으면 8080.
  port: ${PORT:${SERVER_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
